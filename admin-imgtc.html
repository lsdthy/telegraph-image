<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ImgTC · Album Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-ui@2.15.3/lib/theme-chalk/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css">
<style>
/* ══ Design Tokens ══════════════════════════════════════════════════════════ */
:root {
  --bg:          #faf8f5;
  --bg2:         #f3f0ea;
  --surface:     #ffffff;
  --border:      #e8e2d8;
  --border2:     #d4ccc0;
  --text:        #2c2820;
  --text2:       #6b6358;
  --text3:       #9e958a;
  --accent:      #c07d3e;
  --accent-dim:  #d4a06a;
  --accent-soft: #fdf0e4;
  --accent-glow: rgba(192,125,62,0.12);
  --danger:      #c0392b;
  --danger-soft: #fef0ee;
  --success:     #2d8653;
  --success-soft:#eef7f1;
  --info:        #2f6fa8;
  --sidebar-w:   260px;
  --header-h:    54px;
  --radius:      8px;
  --shadow:      0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
  --font-serif:  'Lora', 'Noto Serif SC', Georgia, serif;
  --font-sans:   'DM Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
[data-theme="dark"] {
  --bg:          #1a1814;
  --bg2:         #211f1b;
  --surface:     #252219;
  --border:      #35312a;
  --border2:     #443e34;
  --text:        #ede8e0;
  --text2:       #a89f94;
  --text3:       #6b6358;
  --accent:      #d4905a;
  --accent-dim:  #c07d3e;
  --accent-soft: #2c2018;
  --accent-glow: rgba(212,144,90,0.14);
  --danger:      #e05545;
  --danger-soft: #2a1815;
  --success:     #3ea06a;
  --success-soft:#172a1e;
  --info:        #5b9fd4;
  --shadow:      0 1px 4px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
}

/* ══ Reset & Base ════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font-sans); font-size: 14px; line-height: 1.5;
  transition: background 0.25s, color 0.25s;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

/* ══ App Shell ═══════════════════════════════════════════════════════════════ */
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Header ── */
.app-header {
  height: var(--header-h); flex-shrink: 0;
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 18px; gap: 12px;
  box-shadow: var(--shadow); z-index: 100; position: relative;
}
.app-logo {
  font-family: var(--font-serif); font-size: 17px; font-weight: 600;
  color: var(--accent); white-space: nowrap; letter-spacing: 0.02em;
  cursor: pointer; user-select: none;
}
.app-logo sub { font-family: var(--font-sans); font-size: 10px; color: var(--text3); font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; margin-left: 4px; vertical-align: baseline; }

.header-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

.header-search { position: relative; }
.header-search input {
  width: 220px; height: 32px; padding: 0 12px 0 34px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 99px; color: var(--text); font-family: var(--font-sans); font-size: 13px;
  transition: width 0.25s, border-color 0.2s, background 0.2s;
  outline: none;
}
.header-search input::placeholder { color: var(--text3); }
.header-search input:focus { width: 280px; border-color: var(--accent); background: var(--surface); }
.header-search .search-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 12px; pointer-events: none; }

.header-stat {
  display: flex; align-items: center; gap: 6px;
  background: var(--accent-soft); border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 99px; font-size: 12px; color: var(--accent);
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.header-stat:hover { background: var(--accent-glow); border-color: var(--accent-dim); }

.header-actions { display: flex; align-items: center; gap: 2px; margin-left: auto; }
.hbtn {
  width: 34px; height: 34px; border-radius: var(--radius); border: none;
  background: transparent; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.18s;
}
.hbtn:hover { background: var(--bg2); color: var(--accent); }
.hbtn.active { color: var(--accent); background: var(--accent-soft); }

/* ── Body Layout ── */
.app-body { display: flex; flex: 1; overflow: hidden; }

/* ══ Sidebar ═════════════════════════════════════════════════════════════════*/
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: width 0.25s;
}
.sidebar.collapsed { width: 0; }

.sidebar-header {
  padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sidebar-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
.sidebar-actions { display: flex; gap: 2px; }
.sbtn {
  width: 26px; height: 26px; border-radius: 6px; border: none;
  background: transparent; color: var(--text3); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 12px;
  transition: all 0.15s;
}
.sbtn:hover { background: var(--accent-soft); color: var(--accent); }

.album-tree { flex: 1; overflow-y: auto; padding: 8px 0; }

/* Tree nodes */
.tree-node { }
.tree-row {
  display: flex; align-items: center; padding: 0 10px; height: 32px;
  cursor: pointer; border-radius: 6px; margin: 1px 6px;
  transition: background 0.15s; position: relative; gap: 4px;
}
.tree-row:hover { background: var(--bg2); }
.tree-row:hover .tree-ops { opacity: 1; }
.tree-row.active { background: var(--accent-soft); }
.tree-row.active .tree-name { color: var(--accent); font-weight: 500; }

.tree-indent { flex-shrink: 0; }
.tree-toggle {
  width: 16px; height: 16px; border-radius: 4px; border: none;
  background: transparent; color: var(--text3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; flex-shrink: 0; transition: transform 0.15s, color 0.15s;
}
.tree-toggle:hover { color: var(--accent); }
.tree-toggle.open { transform: rotate(90deg); }
.tree-toggle.leaf { opacity: 0; pointer-events: none; }

.tree-icon { font-size: 13px; flex-shrink: 0; color: var(--accent-dim); }
.tree-row.active .tree-icon { color: var(--accent); }
.tree-name { flex: 1; font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.tree-count { font-size: 10px; color: var(--text3); background: var(--bg2); padding: 1px 6px; border-radius: 99px; flex-shrink: 0; }

.tree-ops {
  display: flex; gap: 1px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0;
}
.tree-op {
  width: 20px; height: 20px; border-radius: 4px; border: none;
  background: transparent; color: var(--text3); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 10px;
  transition: all 0.15s;
}
.tree-op:hover { background: var(--accent-soft); color: var(--accent); }
.tree-op.danger:hover { background: var(--danger-soft); color: var(--danger); }

.tree-children { overflow: hidden; transition: max-height 0.2s ease; }

/* Special tree items */
.tree-special-label {
  padding: 12px 16px 4px; font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3);
}

/* New album inline input */
.tree-new-input {
  display: flex; align-items: center; gap: 6px;
  margin: 2px 6px; padding: 0 10px; height: 32px;
}
.tree-new-input input {
  flex: 1; height: 24px; padding: 0 8px; font-size: 12px;
  border: 1px solid var(--accent); border-radius: 5px; outline: none;
  background: var(--surface); color: var(--text); font-family: var(--font-sans);
}
.tree-new-confirm, .tree-new-cancel {
  width: 22px; height: 22px; border-radius: 4px; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0;
}
.tree-new-confirm { background: var(--success-soft); color: var(--success); }
.tree-new-cancel { background: var(--danger-soft); color: var(--danger); }

/* ══ Main Content ════════════════════════════════════════════════════════════ */
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Toolbar */
.toolbar {
  padding: 10px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  background: var(--surface); flex-shrink: 0;
}
.toolbar-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
.toolbar-right { display: flex; align-items: center; gap: 6px; }

/* Breadcrumb */
.breadcrumb { display: flex; align-items: center; gap: 4px; min-width: 0; }
.bc-item {
  font-size: 13px; color: var(--text2); cursor: pointer;
  padding: 2px 6px; border-radius: 5px; transition: all 0.15s;
  white-space: nowrap;
}
.bc-item:hover { color: var(--accent); background: var(--accent-soft); }
.bc-item.current { color: var(--text); cursor: default; font-weight: 500; }
.bc-item.current:hover { background: transparent; }
.bc-sep { color: var(--border2); font-size: 11px; flex-shrink: 0; }

/* Filter tabs */
.filter-tabs { display: flex; gap: 2px; background: var(--bg2); border-radius: 7px; padding: 3px; }
.ftab {
  padding: 4px 12px; border-radius: 5px; border: none; background: transparent;
  color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer;
  font-family: var(--font-sans); transition: all 0.18s; white-space: nowrap;
}
.ftab:hover { color: var(--text); }
.ftab.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow); }

/* Toolbar button */
.tbtn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--surface); color: var(--text2); font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: var(--font-sans); transition: all 0.18s; white-space: nowrap;
}
.tbtn:hover { border-color: var(--accent-dim); color: var(--accent); background: var(--accent-soft); }
.tbtn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.tbtn.primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); color: #fff; }
.tbtn.danger { color: var(--danger); }
.tbtn.danger:hover { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }
.tbtn i { font-size: 11px; }

/* Selection bar */
.selection-bar {
  background: var(--accent-soft); border-bottom: 1px solid var(--accent-dim);
  padding: 8px 18px; display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--accent); flex-shrink: 0;
}
.selection-bar strong { font-weight: 600; }

/* File list */
.file-list-wrap { flex: 1; overflow-y: auto; }
.file-table { width: 100%; border-collapse: collapse; }
.file-table thead th {
  padding: 8px 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text3); background: var(--bg);
  border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap;
  position: sticky; top: 0; z-index: 2;
}
.file-table thead th:first-child { width: 36px; text-align: center; }
.file-table thead th.col-name { min-width: 200px; }
.file-table thead th.col-album { width: 160px; }
.file-table thead th.col-size  { width: 80px; }
.file-table thead th.col-date  { width: 140px; }
.file-table thead th.col-ops   { width: 120px; text-align: right; }

.file-row { border-bottom: 1px solid var(--border); transition: background 0.12s; }
.file-row:hover { background: var(--bg2); }
.file-row:hover .file-ops { opacity: 1; }
.file-row.selected-row { background: var(--accent-soft); }
.file-row.selected-row:hover { background: var(--accent-soft); }

.file-row td { padding: 9px 12px; font-size: 13px; vertical-align: middle; }
.file-row td:first-child { text-align: center; }

.file-icon-name { display: flex; align-items: center; gap: 10px; min-width: 0; }
.file-type-icon {
  width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.file-type-icon.img  { background: #fde8d0; color: #c07d3e; }
.file-type-icon.vid  { background: #dde8fd; color: #3e6ec0; }
.file-type-icon.aud  { background: #e8ddf8; color: #6e3ec0; }
.file-type-icon.doc  { background: #e8f5e9; color: #2d8653; }

.file-name-wrap { min-width: 0; }
.file-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; }
.file-id   { font-size: 10px; color: var(--text3); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

.album-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 99px; font-size: 11px;
  background: var(--accent-soft); color: var(--accent); white-space: nowrap;
  max-width: 150px; overflow: hidden; text-overflow: ellipsis;
}
.album-tag.none { background: var(--bg2); color: var(--text3); }
.liked-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

.file-date { color: var(--text2); font-size: 12px; white-space: nowrap; }
.file-size { color: var(--text3); font-size: 12px; white-space: nowrap; }

.file-ops {
  display: flex; align-items: center; justify-content: flex-end; gap: 2px;
  opacity: 0; transition: opacity 0.15s;
}
.fop {
  width: 28px; height: 28px; border-radius: 6px; border: none;
  background: transparent; color: var(--text3); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 12px;
  transition: all 0.15s;
}
.fop:hover { background: var(--bg2); color: var(--accent); }
.fop.danger:hover { background: var(--danger-soft); color: var(--danger); }

/* Checkbox custom */
.cb-wrap { width: 16px; height: 16px; position: relative; cursor: pointer; }
.cb-wrap input[type=checkbox] { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 1; }
.cb-box {
  width: 16px; height: 16px; border: 1.5px solid var(--border2); border-radius: 4px;
  background: var(--surface); display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-size: 9px; color: transparent;
}
.cb-wrap input:checked ~ .cb-box { background: var(--accent); border-color: var(--accent); color: #fff; }
.cb-wrap input:checked ~ .cb-box::after { content: '✓'; }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 20px; text-align: center; color: var(--text3);
}
.empty-icon { font-size: 40px; margin-bottom: 16px; color: var(--border2); }
.empty-state h3 { font-family: var(--font-serif); font-weight: 400; font-size: 18px; color: var(--text2); margin-bottom: 6px; }
.empty-state p { font-size: 13px; line-height: 1.6; }

/* Pagination */
.pagination-bar {
  padding: 12px 18px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); flex-shrink: 0; font-size: 12px; color: var(--text3);
}
.pg-btns { display: flex; gap: 4px; }
.pg-btn {
  width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text2); cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-family: var(--font-sans);
}
.pg-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
.pg-btn.current { background: var(--accent); color: #fff; border-color: var(--accent); }
.pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ══ Dialogs ═════════════════════════════════════════════════════════════════ */
.modal-mask {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  backdrop-filter: blur(3px); z-index: 500;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; box-shadow: 0 24px 64px rgba(0,0,0,0.25);
  width: 580px; max-width: calc(100vw - 32px); max-height: 85vh;
  display: flex; flex-direction: column; animation: slideUp 0.2s ease;
}
.modal-box.wide { width: 680px; }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.modal-header {
  padding: 18px 22px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.modal-title { font-family: var(--font-serif); font-size: 16px; font-weight: 600; color: var(--text); }
.modal-close {
  width: 28px; height: 28px; border-radius: 6px; border: none;
  background: transparent; color: var(--text3); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.modal-close:hover { background: var(--bg2); color: var(--text); }

.modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 14px 22px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-shrink: 0;
}

/* Form elements */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.04em; }
.form-input, .form-textarea, .form-select {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border2); border-radius: var(--radius);
  background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 13px;
  transition: border-color 0.2s, background 0.2s; outline: none;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); background: var(--surface); }
.form-textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
.form-hint { margin-top: 5px; font-size: 11px; color: var(--text3); line-height: 1.5; }
.form-hint code { background: var(--bg2); padding: 1px 5px; border-radius: 4px; font-family: monospace; }

/* Tab pills in modal */
.modal-tabs { display: flex; gap: 2px; margin-bottom: 18px; background: var(--bg2); border-radius: 7px; padding: 3px; }
.mtab {
  flex: 1; padding: 7px; border-radius: 5px; border: none; background: transparent;
  color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer;
  font-family: var(--font-sans); transition: all 0.15s; text-align: center;
}
.mtab.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow); }

/* Link display */
.link-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
.link-row {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  background: var(--bg2); border-radius: 6px; font-size: 12px; font-family: monospace;
  color: var(--text2); cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.link-row:hover { border-color: var(--accent-dim
